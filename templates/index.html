<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<title>AI Skin Analyzer</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
background:linear-gradient(135deg,#e9fffa,#8f4e8d);
min-height:100vh;
display:flex;
align-items:center;
}

.card-glass{
background:rgba(255,255,255,0.25);
backdrop-filter:blur(12px);
border-radius:20px;
padding:30px;
box-shadow:0 8px 30px rgba(0,0,0,0.2);
}

.upload-box{
border:2px dashed #5dd1a3;
border-radius:15px;
padding:25px;
text-align:center;
cursor:pointer;
}

input[type=file]{
display:none;
}

.preview{
margin-top:15px;
border-radius:10px;
max-width:100%;
}

video{
width:100%;
border-radius:12px;
}

.progress{
height:18px;
border-radius:10px;
background:#ddd;
}

.progress-bar{
background:linear-gradient(90deg,#00d2ff,#3a7bd5);
}

</style>

</head>

<body>

<div class="container">
<div class="row justify-content-center">
<div class="col-md-6">

<div class="card-glass">

<h3 class="text-center mb-3">
AI Skin Analyzer
</h3>

<p class="text-center">
Nhận diện loại da bằng Deep Learning
</p>

<!-- TAB -->

<ul class="nav nav-tabs mb-3">

<li class="nav-item">
<button class="nav-link active"
data-bs-toggle="tab"
data-bs-target="#uploadTab">
📁 Upload ảnh
</button>
</li>

<li class="nav-item">
<button class="nav-link"
data-bs-toggle="tab"
data-bs-target="#cameraTab">
📷 Chụp ảnh
</button>
</li>

</ul>


<div class="tab-content">

<!-- ================= -->
<!-- Upload tab -->
<!-- ================= -->

<div class="tab-pane fade show active" id="uploadTab">

<form method="POST" enctype="multipart/form-data">

<label class="upload-box">
Click để chọn ảnh
<input type="file" name="file" onchange="previewImage(event)">
</label>

<div class="text-center">
<img id="preview" class="preview" style="display:none;">
</div>

<div class="d-grid mt-3">
<button class="btn btn-light">
Phân tích AI
</button>
</div>

</form>

</div>



<!-- ================= -->
<!-- Camera tab -->
<!-- ================= -->

<div class="tab-pane fade" id="cameraTab">

<button class="btn btn-success mb-3" onclick="startCamera()">
🎥 Bắt đầu camera
</button>

<video id="camera" autoplay style="display:none"></video>

<div class="d-grid mt-3">

<button class="btn btn-warning"
onclick="capture()"
id="captureBtn"
style="display:none">

📸 Chụp ảnh

</button>

</div>

<div class="text-center mt-3">
<img id="capturedImage" class="preview" style="display:none;">
</div>


{% if prediction %}

<div class="mt-4">

<h5 class="text-center">
Kết quả: <b>{{ prediction }}</b>
</h5>

{% for label,p in probs.items() %}

<div class="mb-2">

<small>{{ label }} ({{ p }}%)</small>

<div class="progress">

<div class="progress-bar"
style="width: {{ p }}%">

</div>

</div>

</div>

{% endfor %}

</div>

{% endif %}


<canvas id="snapshot" style="display:none"></canvas>

<form id="cameraForm" method="POST">

<input type="hidden"
name="image_data"
id="image_data">

</form>

</div>

</div>

</div>

</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

function previewImage(event){

const preview=document.getElementById('preview')

preview.src=URL.createObjectURL(event.target.files[0])

preview.style.display='block'

}

let video=document.getElementById("camera")

function startCamera(){

navigator.mediaDevices.getUserMedia({video:true})

.then(stream=>{

video.srcObject=stream

video.style.display="block"

document.getElementById("captureBtn").style.display="block"

})

}

function capture(){

const canvas=document.getElementById("snapshot")

const context=canvas.getContext("2d")

canvas.width=video.videoWidth
canvas.height=video.videoHeight

context.drawImage(video,0,0)

const dataURL=canvas.toDataURL("image/png")

const captured=document.getElementById("capturedImage")

captured.src=dataURL

captured.style.display="block"

document.getElementById("image_data").value=dataURL

setTimeout(()=>{

document.getElementById("cameraForm").submit()

},500)

}

</script>

</body>
</html>
