<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>AI Skin Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', Arial, sans-serif;
            background: linear-gradient(135deg, #e9fffa, #8f4e8d);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .card-glass {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
        }

        .upload-box {
            border: 2px dashed #5dd1a3;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            display: block;
        }

        input[type=file] {
            display: none;
        }

        .preview {
            margin-top: 15px;
            border-radius: 10px;
            max-width: 100%;
        }

        video {
            width: 100%;
            border-radius: 12px;
        }

        .progress {
            height: 18px;
            border-radius: 10px;
            background: #ddd;
        }

        .progress-bar {
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
        }
    </style>
</head>

<body>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6">

                <div class="card-glass">
                    <h3 class="text-center mb-3">AI Skin Analyzer</h3>
                    <p class="text-center">Nhận diện loại da bằng Deep Learning</p>

                    <ul class="nav nav-tabs mb-3 justify-content-center">
                        <li class="nav-item">
                            <button class="nav-link {% if active_tab == 'upload' or not active_tab %}active{% endif %}" data-bs-toggle="tab" data-bs-target="#uploadTab">
                                📁 Upload ảnh
                            </button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link {% if active_tab == 'camera' %}active{% endif %}" data-bs-toggle="tab" data-bs-target="#cameraTab">
                                📷 Chụp ảnh
                            </button>
                        </li>
                    </ul>

                    <div class="tab-content">

                        <div class="tab-pane fade {% if active_tab == 'upload' or not active_tab %}show active{% endif %}" id="uploadTab">
                            <form method="POST" enctype="multipart/form-data">
                                <label class="upload-box">
                                    Click để chọn ảnh
                                    <input type="file" name="file" accept="image/*" onchange="previewImage(event)">
                                </label>

                                <div class="text-center">
                                    <img id="preview" class="preview" {% if image_path and active_tab == 'upload' %}src="/{{ image_path }}" style="display:block;"{% else %}style="display:none;"{% endif %}>
                                </div>

                                <div class="d-grid mt-3">
                                    <button type="submit" class="btn btn-light fw-bold">
                                        ✨ Phân tích AI
                                    </button>
                                </div>
                            </form>
                        </div>

                        <div class="tab-pane fade {% if active_tab == 'camera' %}show active{% endif %}" id="cameraTab">
                            
                            <div id="camera-setup" class="text-center" {% if active_tab == 'camera' and camera_image %}style="display:none;"{% endif %}>
                                <button class="btn btn-success mb-3" onclick="startCamera()" id="startCamBtn">
                                    🎥 Bắt đầu camera
                                </button>
                                <video id="camera" autoplay style="display:none"></video>
                                <div class="d-grid mt-3">
                                    <button class="btn btn-warning fw-bold" onclick="capture()" id="captureBtn" style="display:none">
                                        📸 Chụp ảnh
                                    </button>
                                </div>
                            </div>

                            <div id="camera-review" {% if active_tab == 'camera' and camera_image %}style="display:block;"{% else %}style="display:none;"{% endif %}>
                                <div class="text-center mt-3">
                                    <img id="capturedImage" class="preview" {% if active_tab == 'camera' and camera_image %}src="{{ camera_image }}"{% endif %}>
                                </div>
                                
                                <div class="row mt-3">
                                    <div class="col-6 d-grid">
                                        <button class="btn btn-secondary" onclick="retakePhoto()">
                                            🔄 Chụp ảnh khác
                                        </button>
                                    </div>
                                    <div class="col-6 d-grid">
                                        <button class="btn btn-light fw-bold" onclick="submitCameraPhoto()">
                                            ✨ Phân tích AI
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <canvas id="snapshot" style="display:none"></canvas>
                            <form id="cameraForm" method="POST">
                                <input type="hidden" name="image_data" id="image_data" {% if active_tab == 'camera' and camera_image %}value="{{ camera_image }}"{% endif %}>
                            </form>
                        </div>
                    </div>

                    <div id="result-section">
                        {% if prediction %}
                        <hr class="my-4">
                        <div class="mt-4">
                            <h5 class="text-center">
                                Kết quả: <b class="text-primary">{{ prediction }}</b>
                            </h5>
                            
                            <div class="mt-3">
                                {% for label, p in probs.items() %}
                                <div class="mb-2">
                                    <div class="d-flex justify-content-between">
                                        <small>{{ label }}</small>
                                        <small>{{ p }}%</small>
                                    </div>
                                    <div class="progress">
                                        <div class="progress-bar" style="width: {{ p }}%"></div>
                                    </div>
                                </div>
                                {% endfor %}
                            </div>
                        </div>
                        {% endif %}
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // --- Hàm ẩn kết quả cũ ---
        function hideResult() {
            const resultDiv = document.getElementById('result-section');
            if (resultDiv) {
                resultDiv.style.display = 'none';
            }
        }

        // --- Lắng nghe sự kiện khi chuyển Tab của Bootstrap ---
        document.addEventListener("DOMContentLoaded", function() {
            const triggerTabList = document.querySelectorAll('button[data-bs-toggle="tab"]');
            triggerTabList.forEach(triggerEl => {
                triggerEl.addEventListener('show.bs.tab', event => {
                    hideResult(); 
                });
            });
        });

        // --- Xử lý Upload ---
        function previewImage(event) {
            hideResult(); 
            const preview = document.getElementById('preview');
            if(event.target.files.length > 0) {
                preview.src = URL.createObjectURL(event.target.files[0]);
                preview.style.display = 'block';
            }
        }

        // --- Xử lý Camera ---
        let video = document.getElementById("camera");
        let streamTrack = null; 

        function startCamera() {
            hideResult(); 
            
            document.getElementById("startCamBtn").style.display = "none";
            document.getElementById("camera-setup").style.display = "block";
            document.getElementById("camera-review").style.display = "none";

            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
                .then(stream => {
                    streamTrack = stream;
                    video.srcObject = stream;
                    video.style.display = "block";
                    document.getElementById("captureBtn").style.display = "block";
                })
                .catch(err => {
                    alert("Không thể truy cập camera: " + err);
                });
        }

        function capture() {
            const canvas = document.getElementById("snapshot");
            const context = canvas.getContext("2d");
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0);

            // NÉN ẢNH THÀNH JPEG
            const dataURL = canvas.toDataURL("image/jpeg", 0.8);
            
            const captured = document.getElementById("capturedImage");
            captured.src = dataURL;
            
            document.getElementById("image_data").value = dataURL;

            if (streamTrack) {
                streamTrack.getTracks().forEach(track => track.stop());
            }

            document.getElementById("camera-setup").style.display = "none";
            document.getElementById("camera-review").style.display = "block";
        }

        function retakePhoto() {
            startCamera();
        }

        function submitCameraPhoto() {
            document.getElementById("cameraForm").submit();
        }
    </script>

</body>
</html>
